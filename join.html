<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join The Honkan Empire</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>

<body>

  <header class="hero-small">
    <h1>Join The Honkan Empire</h1>
    <p>Submit your application below</p>
  </header>

  <section class="card">
    <input id="first" placeholder="First Name"><br><br>
    <input id="last" placeholder="Last Name"><br><br>
    <textarea id="message" placeholder="Message"></textarea><br><br>
    <textarea id="reason" placeholder="Why do you want to join?"></textarea><br><br>

    <button onclick="sendForm()">Submit Application</button>
  </section>

  <script src="join.js"></script>
</body>
</html>
